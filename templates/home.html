<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Performance Predictor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:
            radial-gradient(circle at top left,#5b86e5,#1e3c72 40%,#0f172a 100%);
            overflow-x:hidden;
            position:relative;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 15px;
        }

        body::before{
            content:'';
            position:absolute;
            width:400px;
            height:400px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            top:-120px;
            left:-120px;
            backdrop-filter:blur(10px);
        }

        body::after{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:rgba(255,255,255,0.05);
            border-radius:50%;
            bottom:-120px;
            right:-120px;
        }

        .main-container{
            width:100%;
            max-width:760px;
            position:relative;
            z-index:2;
        }

        .glass-card{
            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.2);
            backdrop-filter:blur(18px);
            border-radius:30px;
            padding:45px;
            box-shadow:0 15px 50px rgba(0,0,0,0.35);
            animation:fadeUp 1s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .top-badge{
            background:rgba(255,255,255,0.15);
            width:max-content;
            padding:10px 20px;
            border-radius:50px;
            margin:auto;
            margin-bottom:25px;
            color:white;
            font-size:14px;
            font-weight:500;
            letter-spacing:0.5px;
        }

        .main-title{
            text-align:center;
            font-size:3rem;
            font-weight:800;
            color:white;
            line-height:1.2;
        }

        .highlight{
            background:linear-gradient(90deg,#00dbde,#fc00ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{
            text-align:center;
            color:#dbeafe;
            margin-top:15px;
            margin-bottom:35px;
            font-size:15px;
            line-height:1.8;
        }

        .input-box{
            margin-bottom:22px;
        }

        .form-label{
            color:white;
            font-weight:500;
            margin-bottom:8px;
        }

        .form-control,
        .form-select{
            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.18);
            color:white;
            padding:15px;
            border-radius:16px;
            transition:0.3s ease;
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        .form-control:focus,
        .form-select:focus{
            background:rgba(255,255,255,0.18);
            border-color:#00dbde;
            box-shadow:0 0 20px rgba(0,219,222,0.35);
            color:white;
        }

        select option{
            color:black;
        }

        .predict-btn{
            width:100%;
            border:none;
            padding:16px;
            border-radius:18px;
            background:linear-gradient(135deg,#00dbde,#fc00ff);
            color:white;
            font-size:18px;
            font-weight:700;
            margin-top:10px;
            transition:0.4s ease;
            letter-spacing:0.5px;
        }

        .predict-btn:hover{
            transform:translateY(-3px) scale(1.01);
            box-shadow:0 12px 25px rgba(252,0,255,0.35);
        }

        .result-card{
            margin-top:35px;
            background:rgba(255,255,255,0.14);
            border-radius:22px;
            padding:30px;
            text-align:center;
            border:1px solid rgba(255,255,255,0.18);
            animation:glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                box-shadow:0 0 10px rgba(255,255,255,0.1);
            }
            to{
                box-shadow:0 0 25px rgba(0,219,222,0.35);
            }
        }

        .result-title{
            color:#dbeafe;
            font-size:18px;
            margin-bottom:15px;
        }

        .result-score{
            font-size:4rem;
            font-weight:800;
            color:white;
        }

        .footer{
            margin-top:30px;
            text-align:center;
            color:#cbd5e1;
            font-size:14px;
        }

        .footer span{
            color:#00dbde;
            font-weight:600;
        }

        @media(max-width:768px){

            .glass-card{
                padding:28px;
            }

            .main-title{
                font-size:2rem;
            }

            .result-score{
                font-size:3rem;
            }
        }

    </style>
</head>

<body>

<div class="main-container">

    <div class="glass-card">

        <div class="top-badge">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            AI Powered Machine Learning Project
        </div>

        <h1 class="main-title">
            Student Performance <br>
            <span class="highlight">Prediction System</span>
        </h1>

        <p class="subtitle">
            Predict student maths performance instantly using your trained Machine Learning model with Flask 🚀
        </p>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="input-box">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" required>
                    <option selected disabled value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-select" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="input-box">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-select" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="input-box">
                <label class="form-label">Lunch Type</label>
                <select class="form-select" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="input-box">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-select" name="test_preparation_course" required>
                    <option selected disabled value="">Select Course Status</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 input-box">
                    <label class="form-label">Reading Score</label>
                    <input type="number" class="form-control"
                    name="reading_score"
                    placeholder="Enter Reading Score"
                    min="0" max="100" required>
                </div>

                <div class="col-md-6 input-box">
                    <label class="form-label">Writing Score</label>
                    <input type="number" class="form-control"
                    name="writing_score"
                    placeholder="Enter Writing Score"
                    min="0" max="100" required>
                </div>
            </div>

            <button type="submit" class="predict-btn">
                <i class="fa-solid fa-chart-line"></i>
                Predict Maths Score
            </button>

        </form>

        {% if results %}

        <div class="result-card">
            <div class="result-title">
                🎯 Predicted Maths Score
            </div>

            <div class="result-score">
                {{ results }}
            </div>
        </div>

        {% endif %}

        <div class="footer">
            Built with <span>Flask + Machine Learning + Bootstrap</span>
        </div>

    </div>

</div>

</body>
</html>
